services:
  postgres:
    image: 'postgres:17'
    environment:
      POSTGRES_DB: jobhunt
      POSTGRES_USER: jobhunt
      POSTGRES_PASSWORD: jobhunt
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'

volumes:
  pgdata:
