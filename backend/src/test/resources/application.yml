spring:
  application:
    name: job-hunt
  docker:
    compose:
      skip:
        in-tests: true
  datasource:
    url: jdbc:postgresql://localhost:5432/jobhunt
    username: jobhunt
    password: jobhunt
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLWxvY2FsLWRldi1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLUhTMjU2}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

app:
  frontend-base-url: http://localhost:3000
  mail-from: noreply@test.com
  internal-api-secret: test-internal-secret

storage:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: jobhunt-documents
  region: us-east-1

management:
  endpoints:
    web:
      exposure:
        include: health, info, flyway
  endpoint:
    health:
      show-details: always
      show-components: always
