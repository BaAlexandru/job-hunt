spring:
  application:
    name: job-hunt
  docker:
    compose:
      file: ../compose.yaml
      skip:
        in-tests: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:your-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  mail-from: ${MAIL_FROM:noreply@job-hunt.dev}
  internal-api-secret: ${INTERNAL_API_SECRET:local-dev-internal-secret-change-in-production}

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLWxvY2FsLWRldi1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLUhTMjU2}
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

storage:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: jobhunt-documents
  region: us-east-1

management:
  endpoints:
    web:
      exposure:
        include: health, info, flyway
  endpoint:
    health:
      show-details: always
      show-components: always
