apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jobhunt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:baalexandru/job-hunt.git
    targetRevision: master
    path: infra/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
