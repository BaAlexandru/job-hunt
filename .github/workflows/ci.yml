name: CI

on:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: jobhunt
          POSTGRES_USER: jobhunt
          POSTGRES_PASSWORD: jobhunt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done

      - uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run backend tests
        run: ./gradlew :backend:test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --dir frontend test:ci

  build-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/baalexandru/jobhunt-backend
          flavor: |
            latest=false
          tags: |
            type=sha
            type=raw,value={{date 'YYYYMMDD' tz='UTC'}},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/baalexandru/jobhunt-frontend
          flavor: |
            latest=false
          tags: |
            type=sha
            type=raw,value={{date 'YYYYMMDD' tz='UTC'}},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://job-hunt.dev/api
            NEXT_PUBLIC_APP_URL=https://job-hunt.dev
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  scan:
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/baalexandru/jobhunt-backend:latest
          format: table
          output: trivy-backend.txt
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/baalexandru/jobhunt-frontend:latest
          format: table
          output: trivy-frontend.txt
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Post scan results to summary
        if: always()
        run: |
          echo "## Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-backend.txt 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Scan output not available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-frontend.txt 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Scan output not available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  update-tags:
    runs-on: ubuntu-latest
    needs: [build-push]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Update staging image tags
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          cd infra/k8s/overlays/staging
          kustomize edit set image \
            jobhunt-backend=ghcr.io/baalexandru/jobhunt-backend:sha-${SHORT_SHA} \
            jobhunt-frontend=ghcr.io/baalexandru/jobhunt-frontend:sha-${SHORT_SHA}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/staging/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "ci: update staging image tags to sha-${GITHUB_SHA::7} [skip ci]"
          git pull --rebase origin master
          git push
